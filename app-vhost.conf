docRoot                   /home/shahisoft.store/app.shahisoft.store
vhDomain                  $VH_NAME
vhAliases                 www.$VH_NAME
adminEmails               asmin@shahisoft.store
enableGzip                1
enableIpGeo               1

index  {
  useServer               0
  indexFiles              index.php, index.html
}

errorlog $VH_ROOT/logs/shahisoft.store.error_log {
  useServer               0
  logLevel                WARN
  rollingSize             10M
}

accesslog $VH_ROOT/logs/shahisoft.store.access_log {
  useServer               0
  logFormat               "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\""
  logHeaders              5
  rollingSize             10M
  keepDays                10
  compressArchive         1
}

phpIniOverride  {

}

module cache {
 storagePath /usr/local/lsws/cachedata/$VH_NAME
}

scripthandler  {
  add                     lsapi:shahi79574879 php
}

extprocessor shahi79574879 {
  type                    lsapi
  address                 UDS://tmp/lshttpd/shahi79574879.sock
  maxConns                10
  env                     LSAPI_CHILDREN=10
  initTimeout             60
  retryTimeout            0
  persistConn             1
  pcKeepAliveTimeout      1
  respBuffer              0
  autoStart               1
  path                    /usr/local/lsws/lsphp83/bin/lsphp
  extUser                 shahi7957
  extGroup                shahi7957
  memSoftLimit            1024M
  memHardLimit            1024M
  procSoftLimit           400
  procHardLimit           500
}

rewrite  {
  enable                  1
  autoLoadHtaccess        1
}

context /.well-known/acme-challenge {
  location                /home/shahisoft.store/app.shahisoft.store/.well-known/acme-challenge
  allowBrowse             1

  rewrite  {
    enable                  0
  }
  addDefaultCharset       off

  phpIniOverride  {

  }
}

vhssl  {
  keyFile                 /etc/letsencrypt/live/app.shahisoft.store/privkey.pem
  certFile                /etc/letsencrypt/live/app.shahisoft.store/fullchain.pem
  certChain               1
  sslProtocol             24
  enableECDHE             1
  renegProtection         1
  sslSessionCache         1
  enableSpdy              15
  enableStapling           1
  ocspRespMaxAge           86400
}

extprocessor tenant_backend {
  type                    proxy
  address                 127.0.0.1:3001
  maxConns                200
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}

extprocessor admin_backend {
  type                    proxy
  address                 127.0.0.1:3002
  maxConns                200
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}

context /admin {
  type                    proxy
  handler                 admin_backend
  addDefaultCharset       off
}

context / {
  type                    proxy
  handler                 tenant_backend
  addDefaultCharset       off
}
